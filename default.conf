server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  algorithms-study-app.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # images are versioned via ?v= query param, so revalidate frequently
    location /img/ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
